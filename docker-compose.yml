version: "3.8"
services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: escoles_api
    working_dir: /app
    volumes:
      - ./:/app:cached
    entrypoint: ["/bin/bash","-lc"]
    command: ["dotnet build src/Api/Api.csproj -c Debug && exec dotnet /app/src/Api/bin/Debug/net10.0/Api.dll --urls http://0.0.0.0:7000"]
    ports:
      - "7000:7000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=host.docker.internal;Port=5432;Database=escoles;Username=app;Password=app
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - COMPlus_EnableDiagnostics=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  web:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: escoles_web
    working_dir: /app
    volumes:
      - ./:/app:cached
    entrypoint: ["/bin/bash","-lc"]
    command: ["dotnet build src/Web/Web.csproj -c Debug && exec dotnet /app/src/Web/bin/Debug/net10.0/Web.dll --urls http://0.0.0.0:5042"]
    ports:
      - "5042:5042"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=host.docker.internal;Port=5432;Database=escoles;Username=app;Password=app
      - Api__BaseUrl=http://api:7000
      - COMPlus_EnableDiagnostics=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
